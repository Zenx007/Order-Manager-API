services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordermanager_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=ordermanager_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - ordermanager-network

  postgres_db:
    image: postgres:15-alpine
    container_name: ordermanager_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ordermanager_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ordermanager_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ordermanager-network

networks:
  ordermanager-network:
    driver: bridge

volumes:
  pgdata: